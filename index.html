<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Runner</title>
<style>
  :root {
    --ink: #1a1c2c;
    --orange: #f08a24;
    --accent: #2e6cc4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #11131f;
    font-family: 'Trebuchet MS', system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap {
    width: min(96vw, 880px);
    padding: 14px;
  }
  .frame {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04);
    background: #cfe8ff;
  }
  canvas { display: block; width: 100%; height: auto; }

  .hud {
    position: absolute;
    top: 12px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--ink);
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  .hud .score { font-size: clamp(15px, 3.4vw, 22px); }
  .hud .hi { opacity: .55; font-size: clamp(12px, 2.6vw, 16px); align-self: center; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    background: rgba(17,19,31,.42);
    backdrop-filter: blur(2px);
    color: #fff;
    gap: 10px;
    transition: opacity .25s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .title {
    font-size: clamp(26px, 7vw, 52px);
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 0 3px 0 var(--orange), 0 6px 14px rgba(0,0,0,.4);
  }
  .title span { color: var(--orange); text-shadow: 0 3px 0 #b9540f, 0 6px 14px rgba(0,0,0,.4); }
  .sub { font-size: clamp(13px, 3vw, 17px); opacity: .92; max-width: 32ch; line-height: 1.5; }
  .key {
    display:inline-block; padding:2px 9px; margin:0 2px;
    background:#fff; color:var(--ink); border-radius:6px;
    font-size:.85em; font-weight:700; box-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  .btn {
    margin-top: 6px;
    border: none;
    background: var(--orange);
    color: #fff;
    font-weight: 800;
    letter-spacing: 1px;
    font-size: clamp(14px, 3.4vw, 18px);
    padding: 12px 30px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 5px 0 #b9540f, 0 10px 22px rgba(0,0,0,.35);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #b9540f, 0 4px 12px rgba(0,0,0,.35); }
  .final { font-size: clamp(15px, 3.6vw, 20px); font-weight:700; }
  .final b { color: var(--orange); }
  .mute {
    position:absolute; bottom:12px; right:14px;
    pointer-events:auto; cursor:pointer;
    background:rgba(0,0,0,.25); color:#fff; border:none;
    width:34px; height:34px; border-radius:50%; font-size:15px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="frame" id="frame">
    <canvas id="game" width="880" height="320"></canvas>
    <div class="hud">
      <div class="score" id="score">0</div>
      <div class="hi" id="hi">HI 0</div>
    </div>
    <button class="mute" id="mute" title="Sound">🔊</button>

    <div class="overlay" id="startOverlay">
      <div class="title">NINJA <span>RUNNER</span></div>
      <div class="sub">Help the ninja dash through the village. Leap over rocks and duck under flying kunai!</div>
      <div class="sub"><span class="key">Space</span> / <span class="key">↑</span> jump &nbsp;·&nbsp; <span class="key">↓</span> duck &nbsp;·&nbsp; tap to play on mobile</div>
      <button class="btn" id="startBtn">START</button>
    </div>

    <div class="overlay hidden" id="overOverlay">
      <div class="title">WIPED <span>OUT</span></div>
      <div class="final">Score <b id="finalScore">0</b> · Best <b id="bestScore">0</b></div>
      <button class="btn" id="retryBtn">RUN AGAIN</button>
      <div class="sub" style="opacity:.7">Press <span class="key">Space</span> to restart</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND_Y = H - 56;

// ---------- State ----------
const STATE = { MENU: 0, PLAY: 1, OVER: 2 };
let state = STATE.MENU;
let score = 0, highScore = 0, displayScore = 0;
let speed = 5, baseSpeed = 5;
let frame = 0;
let obstacles = [];
let clouds = [];
let particles = [];
let spawnTimer = 0;
let worldTime = 0; // for day/night cycle

// ---------- Player ----------
const player = {
  x: 96, y: GROUND_Y, w: 42, h: 54,
  vy: 0, onGround: true, ducking: false,
  jumpHeld: false, jumps: 0,
};
const GRAVITY = 1.3;
const JUMP_V = -20;

// ---------- Audio (tiny synth, optional) ----------
let audioCtx = null, muted = false;
function beep(freq, dur, type='square', vol=0.05){
  if (muted) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    o.start(t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.stop(t + dur);
  } catch(e){}
}

// ---------- Init scenery ----------
function seedClouds(){
  clouds = [];
  for (let i=0;i<5;i++){
    clouds.push({ x: Math.random()*W, y: 30+Math.random()*90, s: 0.4+Math.random()*0.5, scale: 0.7+Math.random()*0.7 });
  }
}
seedClouds();

// ---------- Drawing: the ninja (pixel art) ----------
const NC = {
  Y:'#f7c531', o:'#d79f1c',        // hair + hair shadow
  S:'#ffd7a8', s:'#ecbb8c',        // skin + skin shadow
  B:'#2f6cc6', P:'#d4dae1',        // headband + metal plate
  E:'#1b1d2b', W:'#d98a5a', m:'#9c4b3a', // eye, whisker, mouth
  J:'#f4861d', j:'#cf6d12',        // jacket + jacket shadow
  N:'#27314a', Z:'#b85e12',        // navy collar, zipper
  D:'#2c3b5e', K:'#11192c'         // pants, sandals
};
// 16-wide grid, head + torso (rows 0..16). Legs are drawn/animated below.
const SPRITE = [
  '....Y..YY..Y....',
  '..Y.YYoYYoYY.Y..',
  '..YYYYYYYYYYYY..',
  '.YYYYYYYYYYYYYY.',
  '.YYYYYYYYYYYYYY.',
  '.YBBBBBBBBBBBBY.',
  '.YBBPPPPPPPPBBY.',
  '.YSSSSSSSSSSSSY.',
  '.YSSEESSSSEESSY.',
  '.YWWSSSmmSSWWSY.',
  '....SSSSSSSS....',
  '..NNNNNNNNNNNN..',
  '..JJJJJZZJJJJj..',
  '..JJJJJZZJJJJj..',
  '.SJJJJJZZJJJJjS.',
  '..jJJJJZZJJJjj..',
  '...DDDDDDDDDD...'
];

function pxRect(ox, top, px, gx, gy, gw, gh){
  const x = Math.round(ox + gx*px),  y  = Math.round(top + gy*px);
  const x2= Math.round(ox + (gx+gw)*px), y2 = Math.round(top + (gy+gh)*px);
  ctx.fillRect(x, y, x2-x, y2-y);
}
function drawGrid(grid, ox, top, px){
  for (let r=0; r<grid.length; r++){
    const row = grid[r];
    for (let c=0; c<row.length; c++){
      const ch = row[c];
      if (ch === '.') continue;
      ctx.fillStyle = NC[ch];
      pxRect(ox, top, px, c, r, 1, 1);
    }
  }
}

function drawNinja(p){
  const px = p.w/16;            // grid is 16 cells wide == player width
  const rows = 20;              // total height in cells
  const ox = Math.round(p.x);
  const top = p.y - rows*px;    // feet at p.y

  // shadow
  ctx.save();
  ctx.globalAlpha = p.onGround ? 0.22 : 0.1;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(p.x + p.w/2, p.y + 2, p.w*0.5, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  if (p.ducking && p.onGround){ drawNinjaDuck(p, px); return; }

  drawGrid(SPRITE, ox, top, px);

  // ----- animated legs (cells rows 17..20) -----
  const PR = (gx,gy,gw,gh)=>pxRect(ox, top, px, gx, gy, gw, gh);
  ctx.fillStyle = NC.D;
  PR(4,17,3,2); PR(9,17,3,2);            // two upper legs
  ctx.fillStyle = NC.K;
  if (!p.onGround){                       // airborne: feet tucked up
    PR(3,18,5,1); PR(10,18,5,1);
  } else {
    const f = Math.floor(frame/5) % 2;    // simple 2-frame run
    if (f === 0){ PR(9,19,5,1); PR(2,18,5,1); }
    else        { PR(4,19,5,1); PR(10,18,5,1); }
  }
}

function drawNinjaDuck(p, px){
  const rows = 11;
  const ox = Math.round(p.x - p.w*0.16);
  const top = p.y - rows*px;
  const PR = (gx,gy,gw,gh)=>pxRect(ox, top, px, gx, gy, gw, gh);

  // legs tucked
  ctx.fillStyle = NC.D; PR(3,8,3,2); PR(8,8,3,2);
  ctx.fillStyle = NC.K; PR(2,10,4,1); PR(9,10,4,1);
  // crouched body
  ctx.fillStyle = NC.J; PR(1,4,11,5);
  ctx.fillStyle = NC.j; PR(1,8,11,1);
  ctx.fillStyle = NC.N; PR(1,4,2,5);
  // head (forward / right)
  ctx.fillStyle = NC.S; PR(11,2,6,5);
  ctx.fillStyle = NC.Y; PR(10,0,7,2); PR(10,2,1,3); PR(16,2,1,3); PR(13,0,1,1);
  ctx.fillStyle = NC.B; PR(11,3,6,1);
  ctx.fillStyle = NC.P; PR(13,3,2,1);
  ctx.fillStyle = NC.E; PR(15,4,1,1);
  ctx.fillStyle = NC.W; PR(12,5,2,1);
}

// ---------- Obstacles ----------
function spawnObstacle(){
  // flying kunai become possible as score rises
  const allowAir = score > 250;
  const type = (allowAir && Math.random() < 0.32) ? 'air' : 'ground';
  if (type === 'air'){
    obstacles.push({ type, x: W+20, y: GROUND_Y - 60 - Math.random()*18, w: 38, h: 16 });
  } else {
    const big = Math.random() < 0.4;
    const h = big ? 46 : 30;
    const w = big ? 30 : (Math.random()<0.5?22:40);
    obstacles.push({ type, x: W+20, y: GROUND_Y, w, h });
  }
}

function drawObstacle(o){
  ctx.save();
  if (o.type === 'air'){
    // flying kunai
    ctx.translate(o.x + o.w/2, o.y);
    const bob = Math.sin(frame/6)*2;
    ctx.translate(0, bob);
    ctx.fillStyle = '#9aa6b5';
    ctx.beginPath();
    ctx.moveTo(-o.w/2, 0); ctx.lineTo(o.w/2-8, -5); ctx.lineTo(o.w/2, 0); ctx.lineTo(o.w/2-8, 5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#5b6573';
    ctx.fillRect(-o.w/2-6, -3, 8, 6);
    ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-o.w/2-6, 0); ctx.lineTo(-o.w/2-12, 0); ctx.stroke();
  } else {
    // training post / rock
    ctx.translate(o.x, o.y);
    ctx.fillStyle = '#6b4a2b';
    roundRect(0, -o.h, o.w, o.h, 5); ctx.fill();
    ctx.fillStyle = '#85613b';
    ctx.fillRect(3, -o.h+4, o.w-6, 5);
    ctx.fillStyle = '#5a3d22';
    ctx.fillRect(0, -o.h, o.w, 4);
    // rope band
    ctx.strokeStyle = '#e0c089'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, -o.h*0.5); ctx.lineTo(o.w, -o.h*0.5); ctx.stroke();
  }
  ctx.restore();
}

// ---------- Particles (dust) ----------
function dust(x, y){
  for (let i=0;i<5;i++){
    particles.push({ x, y, vx: -speed*0.3 - Math.random()*2, vy: -Math.random()*2,
                     life: 20+Math.random()*10, r: 2+Math.random()*3 });
  }
}

// ---------- Helpers ----------
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ---------- Background ----------
function drawBackground(){
  // day/night gradient based on worldTime
  const t = (Math.sin(worldTime/900) + 1) / 2; // 0 night -> 1 day
  const sky = ctx.createLinearGradient(0,0,0,H);
  const top = mix([34,40,72],[160,210,255], t);
  const bot = mix([70,80,120],[224,240,255], t);
  sky.addColorStop(0, rgb(top));
  sky.addColorStop(1, rgb(bot));
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  // sun / moon
  const cx = W*0.78, cy = 70;
  ctx.fillStyle = t>0.5 ? 'rgba(255,236,170,0.95)' : 'rgba(240,244,255,0.92)';
  ctx.beginPath(); ctx.arc(cx, cy, 26, 0, Math.PI*2); ctx.fill();

  // distant hills
  ctx.fillStyle = mix([40,60,70],[150,190,150], t).map ? rgb(mix([40,60,70],[150,190,150], t)) : '#9ac';
  drawHills(GROUND_Y-30, 70, 0.3, mix([60,90,80],[150,200,150],t));
  drawHills(GROUND_Y-10, 50, 0.5, mix([45,70,60],[120,175,120],t));

  // clouds
  ctx.fillStyle = 'rgba(255,255,255,'+(0.5+0.4*t)+')';
  clouds.forEach(c=>{
    drawCloud(c.x, c.y, c.scale);
  });
}
function drawHills(baseY, amp, freqMul, color){
  ctx.fillStyle = rgb(color);
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x=0;x<=W;x+=20){
    const y = baseY - Math.sin((x*0.01*freqMul) + worldTime*0.0006) * amp*0.35 - amp*0.2;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}
function drawCloud(x,y,s){
  ctx.beginPath();
  ctx.arc(x, y, 16*s, 0, Math.PI*2);
  ctx.arc(x+18*s, y+4*s, 13*s, 0, Math.PI*2);
  ctx.arc(x-18*s, y+4*s, 12*s, 0, Math.PI*2);
  ctx.fill();
}
function drawGround(){
  ctx.fillStyle = '#caa46a';
  ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
  ctx.fillStyle = '#a8854f';
  ctx.fillRect(0, GROUND_Y, W, 5);
  // moving texture dashes
  ctx.fillStyle = '#b8945c';
  const offset = (frame*speed) % 60;
  for (let x=-offset; x<W; x+=60){
    ctx.fillRect(x, GROUND_Y+18, 28, 3);
    ctx.fillRect(x+30, GROUND_Y+34, 18, 3);
  }
}
function mix(a,b,t){ return a.map((v,i)=> Math.round(v + (b[i]-v)*t)); }
function rgb(c){ return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }

// ---------- Game loop ----------
function update(){
  frame++;
  worldTime += speed;

  if (state === STATE.PLAY){
    // difficulty ramp
    speed = baseSpeed + Math.min(7, score/300);

    // physics
    if (!player.onGround){
      player.vy += GRAVITY;
      player.y += player.vy;
      if (player.y >= GROUND_Y){
        player.y = GROUND_Y; player.vy = 0; player.onGround = true; player.jumps = 0;
        dust(player.x+player.w/2, GROUND_Y);
      }
    } else if (frame % 7 === 0 && !player.ducking){
      dust(player.x+6, GROUND_Y);
    }

    // spawn — spawnTimer counts down in PIXELS of world travel
    spawnTimer -= speed;
    if (spawnTimer <= 0){
      spawnObstacle();
      // guarantee at least ~0.85s of reaction time regardless of speed,
      // then add random extra spacing
      const minGap = speed * 52;
      spawnTimer = Math.max(minGap, 360 + Math.random()*300);
    }

    // move obstacles + collide
    for (let i=obstacles.length-1;i>=0;i--){
      const o = obstacles[i];
      o.x -= speed;
      if (o.x + o.w < -30){ obstacles.splice(i,1); continue; }
      if (hit(player, o)){ gameOver(); }
    }

    score += 0.15 + speed*0.02;
    if (Math.floor(score) > 0 && Math.floor(score) % 100 === 0 && Math.floor(score) !== player._lastMile){
      player._lastMile = Math.floor(score);
      beep(880, 0.08, 'square', 0.04);
    }
  }

  // clouds drift always
  clouds.forEach(c=>{
    c.x -= c.s * (state===STATE.PLAY ? 0.7 : 0.3);
    if (c.x < -40){ c.x = W+40; c.y = 30+Math.random()*90; c.scale = 0.7+Math.random()*0.7; }
  });

  // particles
  for (let i=particles.length-1;i>=0;i--){
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.05; pt.life--;
    if (pt.life <= 0) particles.splice(i,1);
  }
}

function hit(p, o){
  const pw = p.ducking && p.onGround ? p.w+10 : p.w;
  const ph = p.ducking && p.onGround ? 30 : p.h;
  const px = p.x + 4, py = p.y - ph + 4;
  const ox = o.type==='air' ? o.x : o.x;
  const oy = o.type==='air' ? o.y - o.h/2 : o.y - o.h;
  const ow = o.w, oh = o.h;
  return px < ox+ow-4 && px+pw-8 > ox && py < oy+oh-2 && py+ph-4 > oy;
}

function render(){
  drawBackground();
  drawGround();
  particles.forEach(pt=>{
    ctx.fillStyle = 'rgba(170,140,90,'+(pt.life/30)+')';
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
  });
  obstacles.forEach(drawObstacle);
  drawNinja(player);

  // smooth score display
  displayScore += (score - displayScore) * 0.2;
  document.getElementById('score').textContent = Math.floor(displayScore);
  document.getElementById('hi').textContent = 'HI ' + Math.floor(highScore);
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

// ---------- Actions ----------
function startGame(){
  state = STATE.PLAY;
  score = 0; displayScore = 0; speed = baseSpeed;
  obstacles = []; particles = []; spawnTimer = 420;
  player.y = GROUND_Y; player.vy = 0; player.onGround = true; player.ducking = false; player.jumps = 0;
  player._lastMile = 0;
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');
}

function jump(){
  if (state !== STATE.PLAY) return;
  if (player.onGround || player.jumps < 1){
    // allow a small double-jump for forgiveness only from ground
    if (player.onGround){
      player.vy = JUMP_V; player.onGround = false; player.jumps = 1;
      beep(520, 0.09, 'square', 0.05);
      dust(player.x+6, GROUND_Y);
    }
  }
}
function setDuck(v){
  if (state !== STATE.PLAY) return;
  player.ducking = v;
  if (v && !player.onGround){ player.vy += 4; } // fast fall
}

function gameOver(){
  if (state !== STATE.PLAY) return;
  state = STATE.OVER;
  highScore = Math.max(highScore, score);
  document.getElementById('finalScore').textContent = Math.floor(score);
  document.getElementById('bestScore').textContent = Math.floor(highScore);
  document.getElementById('overOverlay').classList.remove('hidden');
  beep(180, 0.3, 'sawtooth', 0.06);
  setTimeout(()=>beep(120,0.4,'sawtooth',0.05), 120);
}

// ---------- Input ----------
window.addEventListener('keydown', e=>{
  if (['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'ArrowUp'){
    if (state === STATE.MENU) startGame();
    else if (state === STATE.OVER) startGame();
    else jump();
  }
  if (e.code === 'ArrowDown') setDuck(true);
});
window.addEventListener('keyup', e=>{
  if (e.code === 'ArrowDown') setDuck(false);
});

// touch / click
function press(e){
  e.preventDefault();
  if (state === STATE.MENU || state === STATE.OVER) startGame();
  else jump();
}
canvas.addEventListener('pointerdown', press);
document.getElementById('startBtn').addEventListener('click', e=>{ e.stopPropagation(); startGame(); });
document.getElementById('retryBtn').addEventListener('click', e=>{ e.stopPropagation(); startGame(); });
document.getElementById('mute').addEventListener('click', e=>{
  e.stopPropagation();
  muted = !muted;
  document.getElementById('mute').textContent = muted ? '🔇' : '🔊';
});

loop();
</script>
</body>
</html>
